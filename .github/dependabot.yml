version: 2
updates:
  - package-ecosystem: npm
    directory: /
    assignees:
      - muleyuck
    schedule:
      interval: weekly
      day: saturday
      timezone: Asia/Tokyo
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dependabot
